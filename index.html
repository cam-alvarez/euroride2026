<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="description" content="Euroride 2026 — Muñecos Travel Agency. 11-day Harley-Davidson ride through Italy, Switzerland, Austria, Germany & France.">
<meta name="theme-color" content="#f2f4f6">
<title>Euroride 2026 · Muñecos Travel Agency</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<link rel="icon" href="icon-192.png" sizes="192x192">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/app.css">
<script>
/* Apply the saved (or system) theme before first paint to avoid a flash. */
(function () {
  try {
    var pref = JSON.parse(localStorage.getItem('er26.theme') || '"auto"');
    var theme = pref === 'auto'
      ? (matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light')
      : pref;
    document.documentElement.setAttribute('data-theme', theme);
  } catch (e) { /* default stays light */ }
})();
</script>
</head>
<body>
<div id="offline-banner" role="status"></div>

<header class="topbar">
  <div class="shell topbar-row">
    <a class="brand" href="#/home">
      <span class="b1">Euroride <em>2026</em></span>
      <span class="b2">Muñecos Travel Agency</span>
    </a>
    <nav class="top-nav" id="top-nav" aria-label="Primary"></nav>
    <div class="top-actions">
      <div class="pill" id="lang-pill" role="group" aria-label="Language">
        <button data-lang="en" aria-pressed="true">EN</button>
        <button data-lang="es" aria-pressed="false">ES</button>
      </div>
      <button class="icon-btn" id="theme-btn" title="Theme" aria-label="Toggle theme"></button>
      <button class="icon-btn" id="share-btn" title="Share / QR" aria-label="Share"></button>
    </div>
  </div>
</header>

<main id="view" class="shell" tabindex="-1"></main>

<footer class="site-foot">
  <p class="foot-line">Euroride 2026 · Muñecos Travel Agency</p>
  <p class="v">v3.0 · Ride Safe, Ride Together</p>
</footer>

<nav class="tabbar" id="tabbar" aria-label="Primary"></nav>

<div id="modal-root"></div>
<div id="toast" role="status" aria-live="polite"></div>

<noscript>
  <div style="max-width:600px;margin:40px auto;padding:0 20px;font-family:system-ui;text-align:center">
    <h1>Euroride 2026</h1>
    <p>This app needs JavaScript. / Esta aplicación necesita JavaScript.</p>
  </div>
</noscript>

<script type="module" src="js/app.js"></script>
</body>
</html>
